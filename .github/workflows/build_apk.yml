name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            libgl1-mesa-dev libgles2-mesa-dev libffi-dev libssl-dev \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev cmake libstdc++6 ccache

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Link pre-installed Android SDK into buildozer path
        run: |
          mkdir -p ~/.buildozer/android/platform/
          ln -sf /usr/local/lib/android/sdk ~/.buildozer/android/platform/android-sdk
          ls ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > /usr/local/lib/android/sdk/licenses/android-sdk-license

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v2

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload log always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyper-x-debug
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
