name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            libgl1-mesa-dev libgles2-mesa-dev libffi-dev libssl-dev \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev cmake libstdc++6 ccache

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Install old SDK tools so buildozer finds sdkmanager
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          # Download old SDK tools that have tools/bin/sdkmanager
          wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
          unzip -q sdk-tools-linux-4333796.zip -d ~/.buildozer/android/platform/android-sdk/
          # Accept licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-sdk-tools-v1

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload log always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyper-x-debug
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
