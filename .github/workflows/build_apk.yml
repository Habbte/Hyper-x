name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            libgl1-mesa-dev libgles2-mesa-dev libffi-dev libssl-dev \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev cmake libstdc++6 ccache

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Pre-accept SDK licenses in buildozer path
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          printf "\n601085b94cd77f0b54ff86406957099ebe79c4d6" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload log always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyper-x-debug
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
