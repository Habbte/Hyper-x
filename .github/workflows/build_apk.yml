name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            libgl1-mesa-dev libgles2-mesa-dev libffi-dev libssl-dev \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev cmake libstdc++6 ccache

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hyper-x-debug
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
